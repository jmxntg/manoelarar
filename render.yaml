services:
  - type: web
    name: qrcode-hunt-ar-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://qrcode-hunt-ar-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://qrcode-hunt-ar-frontend.onrender.com
      - key: DATABASE_PATH
        value: /tmp/qrcode-hunt-ar-game.sqlite

  - type: static
    name: qrcode-hunt-ar-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://qrcode-hunt-ar-backend.onrender.com
      - key: VITE_SOCKET_URL
        value: https://qrcode-hunt-ar-backend.onrender.com
